{{- if .Values.policyreporter.ui.route.enabled }}
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: policy-reporter
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "gp-kyverno.selectorLabels" . | nindent 4 }}
spec:
  {{- if .Values.policyreporter.ui.route.host }}
  host: {{ .Values.policyreporter.ui.route.host }}
  {{- end }}
  to:
    kind: Service
    name: kyverno-ui
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}